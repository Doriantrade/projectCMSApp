<h2 mat-dialog-title>Técnicos en Mantenimiento</h2>
<mat-dialog-content>
    <div class="container-fluid p-0">
        <div *ngIf="technicians.length === 0" class="alert alert-info">
            No hay técnicos en mantenimiento actualmente.
        </div>

        <div class="row" *ngIf="technicians.length > 0">
            <div class="col-12 mb-3" *ngFor="let tech of technicians">
                <div class="card shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <!-- Tech Image -->
                        <img [src]="tech.imagenPerfil" alt="Tech" class="rounded-circle me-3"
                            style="width: 60px; height: 60px; object-fit: cover; border: 2px solid #ddd;">

                        <!-- Tech & Ticket Info -->
                        <div class="flex-grow-1">
                            <h5 class="card-title mb-1">{{ tech.nombreTecnico }}</h5>
                            <p class="card-text mb-0 text-muted small">
                                <strong>Ticket:</strong> {{ tech.nserie }} |
                                <strong>Equipo:</strong> {{ tech.nombreTipoMaquina }} ({{ tech.nombreMarca }} {{
                                tech.nombreModelo }})
                            </p>
                        </div>

                        <!-- Status Badge -->
                        <div class="ms-3">
                            <span class="badge rounded-pill"
                                [ngStyle]="{'background-color': getBadgeColor(tech.estado), 'color': tech.estado === 3 ? 'black' : 'white'}">
                                {{ tech.nombreEstado }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cerrar</button>
</mat-dialog-actions>
