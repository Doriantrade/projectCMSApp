<div class="modal-content" style="background-color: white; border-radius: 8px;">
    <div class="modal-header d-flex justify-content-between align-items-center p-3 border-bottom">
        <h5 class="modal-title m-0 d-flex align-items-center">
            <mat-icon class="me-2">person</mat-icon> Perfil de Usuario
        </h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="cerrar()"></button>
    </div>

    <div class="modal-body p-4">
        <div *ngIf="loading" class="d-flex justify-content-center p-3">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <form [formGroup]="perfilForm" *ngIf="!loading">
            <div class="mb-3">
                <label class="form-label">Contraseña*</label>
                <div class="input-group">
                    <input [type]="hidePassword ? 'password' : 'text'" class="form-control bg-light" formControlName="Password" placeholder="Ingrese nueva contraseña">
                    <button class="btn btn-outline-secondary d-flex align-items-center" type="button" (click)="togglePasswordVisibility()">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                </div>
                <div class="text-danger mt-1" *ngIf="perfilForm.get('Password')?.hasError('required') && perfilForm.get('Password')?.touched">
                    <small>La contraseña es obligatoria</small>
                </div>
            </div>
        </form>
    </div>

    <div class="modal-footer p-3 border-top d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="cerrar()">Cancelar</button>
        <button type="button" class="btn" style="background-color: #d81b60; color: white;" [disabled]="perfilForm.invalid || loading" (click)="guardar()">Guardar Cambios</button>
    </div>
</div>
